name: Seek Scraper
on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth typescript ts-node @types/node
          npx playwright install chromium --with-deps

      - name: Test Seek Access
        run: |
          echo "HTTP Code: $(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" https://www.seek.com.au/jobs)"
          
      - name: Run Scraper
        run: npx ts-node --project tsconfig.json seek-scraper.ts
